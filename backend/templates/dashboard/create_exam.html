{% extends "dashboard/base_dashboard.html" %} {% block content %}

<h2 class="text-2xl font-bold mb-6 text-gray-700">Create Exam</h2>

<div class="bg-white p-6 rounded-2xl shadow max-w-xl">
  <form method="POST">
    {% csrf_token %}
    <div class="mb-4">
      <label>Subject</label>
      <select name="subject" class="w-full border p-2 rounded" required>
        <option value="">Select Subject</option>
        {% for subject in subjects %}
        <option value="{{ subject.id }}">{{ subject.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-4">
      <label>Exam Title</label>
      <input
        type="text"
        name="title"
        class="w-full border p-2 rounded"
        required
      />
    </div>

    <div class="mb-4">
      <label>Duration (minutes)</label>
      <input
        type="number"
        name="duration"
        class="w-full border p-2 rounded"
        required
      />
    </div>

    <div class="mb-4">
      <label>Total Marks</label>
      <input
        type="number"
        name="total_marks"
        class="w-full border p-2 rounded"
        required
      />
    </div>

    <div class="mb-4">
      <label>Start Time</label>
      <input
        type="datetime-local"
        name="start_time"
        class="w-full border p-2 rounded"
        required
      />
    </div>

    <div class="mb-4">
      <label>End Time</label>
      <input
        type="datetime-local"
        name="end_time"
        class="w-full border p-2 rounded"
        required
      />
    </div>

    <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded">
      Create Exam
    </button>
  </form>
</div>

{% endblock %}
