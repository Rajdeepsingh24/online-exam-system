{% extends "dashboard/base_dashboard.html" %} {% block content %}

<h2 class="text-2xl font-bold mb-6 text-gray-700">
  Add Questions - {{ exam.title }}
</h2>

<div class="bg-white p-6 rounded-2xl shadow mb-6">
  <form method="POST">
    {% csrf_token %}

    <input
      type="text"
      name="question_text"
      placeholder="Question"
      class="w-full border p-2 mb-3 rounded"
      required
    />

    <input
      type="text"
      name="option_a"
      placeholder="Option A"
      class="w-full border p-2 mb-2 rounded"
      required
    />

    <input
      type="text"
      name="option_b"
      placeholder="Option B"
      class="w-full border p-2 mb-2 rounded"
      required
    />

    <input
      type="text"
      name="option_c"
      placeholder="Option C"
      class="w-full border p-2 mb-2 rounded"
      required
    />

    <input
      type="text"
      name="option_d"
      placeholder="Option D"
      class="w-full border p-2 mb-2 rounded"
      required
    />

    <select
      name="correct_answer"
      class="w-full border p-2 mb-3 rounded"
      required
    >
      <option value="">Correct Answer</option>
      <option value="A">A</option>
      <option value="B">B</option>
      <option value="C">C</option>
      <option value="D">D</option>
    </select>

    <input
      type="number"
      name="marks"
      placeholder="Marks"
      class="w-full border p-2 mb-3 rounded"
      required
    />

    <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded">
      Add Question
    </button>
  </form>
</div>
<div class="mt-4 flex gap-4">
  <a
    href="{% url 'teacher_exams' %}"
    class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600"
  >
    Done
  </a>

  <form method="POST" action="{% url 'publish_exam' exam.id %}">
    {% csrf_token %}
    <button
      type="submit"
      class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700"
    >
      Publish Exam
    </button>
  </form>
</div>

<h3 class="text-xl font-semibold mb-4">Existing Questions</h3>

{% for q in questions %}
<div class="bg-white p-4 rounded shadow mb-3">
  <p class="font-semibold">{{ q.question_text }}</p>
  <p class="text-sm text-gray-500">Marks: {{ q.marks }}</p>
</div>
{% empty %}
<p>No questions added yet.</p>
{% endfor %} {% endblock %}
